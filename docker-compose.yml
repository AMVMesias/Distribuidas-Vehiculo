services:
  postgres:
    image: postgres:16
    container_name: vehiculos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: gestion_vehiculos
    ports:
      - "5432:5432"
    volumes:
      - vehiculos_pgdata:/var/lib/postgresql/data

volumes:
  vehiculos_pgdata:
